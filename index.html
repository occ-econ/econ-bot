<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCC Econ Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f2240; --gold: #c8922a; --gold-light: #f0d080;
    --cream: #f7f4ee; --mid: #e8e3d8; --text: #1a1a1a; --muted: #6b6558;
    --bot-bg: #ffffff; --user-bg: #0f2240; --user-text: #f7f4ee; --border: #d4cfc4;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--cream); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--navy); padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; border-bottom: 3px solid var(--gold); }
  .header-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); background: rgba(200,146,42,0.15); border: 1px solid var(--gold); padding: 3px 8px; text-transform: uppercase; }
  header h1 { font-size: 15px; font-weight: 600; color: var(--cream); letter-spacing: 0.02em; }
  header p { font-size: 12px; color: rgba(247,244,238,0.55); margin-top: 1px; }
  .header-text { flex: 1; }
  .course-pills { display: flex; gap: 6px; }
  .pill { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; color: var(--gold-light); border: 1px solid rgba(200,146,42,0.4); padding: 2px 7px; }
  #chat { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .msg { display: flex; gap: 10px; max-width: 780px; width: 100%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .msg.bot .avatar { background: var(--navy); color: var(--gold); border: 1.5px solid var(--gold); }
  .msg.user .avatar { background: var(--gold); color: var(--navy); }
  .bubble { padding: 12px 16px; line-height: 1.65; font-size: 14px; max-width: calc(100% - 44px); }
  .msg.bot .bubble { background: var(--bot-bg); color: var(--text); border: 1px solid var(--border); border-radius: 0 10px 10px 10px; }
  .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-radius: 10px 0 10px 10px; }
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 600; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); animation: bounce 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
  .input-area { background: var(--bot-bg); border-top: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; line-height: 1.5; color: var(--text); background: var(--cream); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; resize: none; min-height: 44px; max-height: 120px; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--navy); }
  textarea::placeholder { color: var(--muted); }
  button#send { background: var(--navy); color: var(--gold); border: none; border-radius: 6px; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  button#send:hover { background: #1a3560; }
  button#send:disabled { opacity: 0.4; cursor: not-allowed; }
  button#send svg { width: 18px; height: 18px; fill: currentColor; }
  .disclaimer { text-align: center; font-size: 11px; color: var(--muted); padding: 6px 16px 10px; background: var(--bot-bg); border-top: 1px solid var(--mid); flex-shrink: 0; }
  @media (max-width: 600px) { header { padding: 12px 16px; } .course-pills { display: none; } #chat { padding: 16px 10px; } }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>OCC Econ Assistant</h1>
    <p>Ask me anything about your course</p>
  </div>
  <div class="course-pills">
    <span class="pill">ECON 170</span>
    <span class="pill">ECON 175</span>
  </div>
  <div class="header-badge">OCC</div>
</header>

<div id="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="Ask a question about the course..." rows="1"></textarea>
  <button id="send" title="Send">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>
<div class="disclaimer">This assistant can make mistakes. For grade disputes or urgent issues, contact your professor directly.</div>

<script>
var API_KEY = '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';

var SYSTEM_PROMPT = "You are the course assistant for Econ 170 (Principles of Microeconomics) and Econ 175 (Macroeconomics) at Orange Coast College (OCC), a California community college. Both courses are currently active this term.\n\nYour job is to help students understand course content, navigate the grading system, and think through economics problems. You answer questions directly and clearly, the way a professor would in office hours.\n\nPEDAGOGY AND VOICE\n\nAnswer the question first. Students came here with a specific question and they should get a real answer. Give a clear, direct explanation and then, if it makes sense, ask one follow-up question to check understanding or push them a little deeper.\n\nThe exception is when a student is obviously trying to get you to do their homework for them, meaning they paste a question and ask for the answer with no context or effort shown. In that case, ask what they have tried so far before solving it for them.\n\nYou value economic reasoning over definitions. After you answer, point toward the reasoning behind the concept, not just the definition. A student who understands why a firm stops producing where MC equals MR knows more than one who can just define marginal cost.\n\nIf a student gives a vague or surface-level follow-up, push them to be more specific. But do not do this on the opening question. Answer first.\n\nYou do not moralize or lecture students about study habits. Your job is economics and course logistics, not life coaching.\n\nGRADING SYSTEM: ECON 170\n\nThe course uses a gamified grading system with four elements.\n\nSHIELD POINTS: Students start with a Test Shield that protects them on the Final Exam. The Shield absorbs damage from a poor final exam score. Shield Points are earned through Mastery Badge Challenges throughout the semester.\n\nSTAMINA POINTS: A separate resource. Students spend Stamina to attempt Respawn Quests, which are recovery opportunities after poor performance. Stamina is earned through class participation and engagement activities.\n\nMASTERY BADGE CHALLENGES: Badges come in three tiers. 1-Star Badge: 10 True/False questions, 1 point each, auto-graded in Canvas. 2-Star Badge: 10 Multiple Choice questions, 1 point each, auto-graded in Canvas. 3-Star Badge: Written or mixed-format, requires developed economic reasoning.\n\nRESPAWN QUESTS: When a student performs poorly on a quiz or exam, they can spend Stamina Points to attempt a Respawn Quest, a recovery assignment that allows them to earn back some lost points. Respawn Quests are not free retakes. They require real work and economic analysis.\n\nEMERGENCY SHIELD REPAIR: Only available when a student's Shield has dropped below 5%. It cannot restore the Shield above 5%. It is a last-resort mechanic, not a routine recovery tool.\n\nCOURSE CONTENT: ECON 170\n\nCore topics: Production Possibilities Frontier, Budget Constraints, Supply and Demand, Elasticity, Consumer Theory, Costs and Production, Price Controls, Perfect Competition, Monopoly, Oligopoly, Monopolistic Competition, Public Goods and Externalities, Labor Markets.\n\nGraphing is central to this course. Common graphs include supply and demand, cost curves (MC, ATC, AVC, AFC), PPF, and monopoly profit diagrams.\n\nMany problem sets use a fictional town called Millbrook with recurring characters and businesses.\n\nCOURSE CONTENT: ECON 175\n\nCore topics: GDP measurement, Business cycles, Unemployment, Inflation, AD-AS model, Fiscal Policy, Money and Banking, Monetary Policy, IS-MP-Phillips Curve Model, Phillips Curve, International Trade.\n\nThe IS-MP model is used alongside AD-AS. The MP curve shows the real interest rate on the vertical axis and inflation on the horizontal axis. The IS curve shows the relationship between output and the real interest rate.\n\nMany macro problem sets use a recurring restaurant owner character to illustrate real-world macroeconomic decisions.\n\nCOURSE LOGISTICS\n\nBoth courses are at Orange Coast College in Costa Mesa, California. Canvas is the course management system. If a student asks about something you do not have specific information on, such as exact due dates, their personal grade, or specific assignment instructions, tell them clearly and direct them to check Canvas or contact the professor directly. Do not make up specific dates, point values, or assignment details.\n\nTONE AND BOUNDARIES\n\nBe direct and clear. Do not pad responses with filler. Do not do a student's homework for them. Guide, do not solve. If a student is frustrated, acknowledge it briefly and redirect to the problem. You cannot make grading decisions. For anything involving grades, exceptions, or accommodations, direct the student to contact the professor. Keep responses reasonably concise.";

var history = [];

var chatEl = document.getElementById('chat');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('send');

function renderText(text) {
  var escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var bolded = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  var paras = bolded.split('\n\n').map(function(p) {
    return p.trim() ? '<p>' + p.replace(/\n/g, '<br>') + '</p>' : '';
  }).join('');
  return paras;
}

function addMessage(role, text) {
  var wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? 'EC' : 'ME';
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderText(text);
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  var wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';
  var avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'EC';
  var bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function sendMessage() {
  var text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: history
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    removeTyping();
    if (data.content && data.content[0]) {
      var reply = data.content[0].text;
      addMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });
    } else {
      addMessage('bot', 'Something went wrong. Please try again.');
    }
  })
  .catch(function(err) {
    removeTyping();
    addMessage('bot', 'Connection error: ' + err.message);
  })
  .finally(function() {
    sendBtn.disabled = false;
    inputEl.focus();
  });
}

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', function() {
  sendMessage();
});

addMessage('bot', 'Hi, I am the OCC Econ Assistant for Econ 170 and Econ 175. I can help with course content, grading system questions, and working through problems. What do you need help with?');
</script>
</body>
</html>
