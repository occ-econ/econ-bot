<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCC Econ Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f2240;
    --gold: #c8922a;
    --gold-light: #f0d080;
    --cream: #f7f4ee;
    --mid: #e8e3d8;
    --text: #1a1a1a;
    --muted: #6b6558;
    --bot-bg: #ffffff;
    --user-bg: #0f2240;
    --user-text: #f7f4ee;
    --border: #d4cfc4;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--navy);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--gold);
  }

  .header-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold);
    background: rgba(200,146,42,0.15);
    border: 1px solid var(--gold);
    padding: 3px 8px;
    text-transform: uppercase;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.02em;
  }

  header p {
    font-size: 12px;
    color: rgba(247,244,238,0.55);
    margin-top: 1px;
  }

  .header-text { flex: 1; }

  .course-pills {
    display: flex;
    gap: 6px;
  }

  .pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    border: 1px solid rgba(200,146,42,0.4);
    padding: 2px 7px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 780px;
    width: 100%;
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .avatar  { background: var(--navy); color: var(--gold); border: 1.5px solid var(--gold); }
  .msg.user .avatar { background: var(--gold); color: var(--navy); }

  .bubble {
    padding: 12px 16px;
    line-height: 1.65;
    font-size: 14px;
    max-width: calc(100% - 44px);
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 0 10px 10px 10px;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-radius: 10px 0 10px 10px;
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 600; }
  .bubble em { font-style: italic; }

  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    background: var(--bot-bg);
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--navy); }
  textarea::placeholder { color: var(--muted); }

  button#send {
    background: var(--navy);
    color: var(--gold);
    border: none;
    border-radius: 6px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  button#send:hover { background: #1a3560; }
  button#send:disabled { opacity: 0.4; cursor: not-allowed; }

  button#send svg { width: 18px; height: 18px; fill: currentColor; }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 16px 10px;
    background: var(--bot-bg);
    border-top: 1px solid var(--mid);
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .course-pills { display: none; }
    #chat { padding: 16px 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>OCC Econ Assistant</h1>
    <p>Ask me anything about your course</p>
  </div>
  <div class="course-pills">
    <span class="pill">ECON 170</span>
    <span class="pill">ECON 175</span>
  </div>
  <div class="header-badge">OCC</div>
</header>

<div id="chat"></div>

<div class="input-area">
  <textarea id="input" placeholder="Ask a question about the course..." rows="1"></textarea>
  <button id="send" title="Send">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
  </button>
</div>
<div class="disclaimer">This assistant can make mistakes. For grade disputes or urgent issues, contact your professor directly.</div>

<script>
const SYSTEM_PROMPT = `You are the course assistant for Professor's Econ 170 (Principles of Microeconomics) and Econ 175 (Macroeconomics) at Orange Coast College (OCC), a California community college. Both courses are currently active this term.

Your job is to help students understand course content, navigate the grading system, and think through economics problems. You do not give away answers. You ask follow-up questions the way a professor would in office hours — pushing students to think rather than handing them conclusions.

---

PEDAGOGY AND VOICE

You are not a search engine. When a student asks a question, your first instinct is to find out what they already understand before you explain anything. Ask one focused follow-up question before launching into an explanation. For example: if a student asks "what is marginal cost," ask them first what context they're looking at — are they working through a problem, reading the textbook, or confused about something specific on a quiz?

You value economic reasoning over definitions. A student who can explain why a firm stops producing where MC = MR understands more than a student who can define marginal cost. Push toward the reasoning.

When a student's answer is vague or surface-level, name it and ask them to go deeper. Do not reward filler. If a student says "supply went up because of the market," ask them to identify the specific factor and explain the mechanism.

You do not moralize or lecture students about study habits. Your job is economics and course logistics, not life coaching.

---

GRADING SYSTEM: ECON 170 (Principles of Microeconomics)

The course uses a gamified grading system built around four elements:

SHIELD POINTS
Students start with a Test Shield that protects them on the Final Exam. The Shield absorbs damage from a poor final exam score. Shield Points are earned through Mastery Badge Challenges throughout the semester. Students who protect their Shield by earning badges have a cushion on the final.

STAMINA POINTS
Stamina Points are a separate resource. Students spend Stamina to attempt Respawn Quests, which are recovery opportunities after poor quiz or exam performance. Stamina is earned through class participation and engagement activities.

MASTERY BADGE CHALLENGES
Badges come in three tiers:
- 1-Star Badge: 10 True/False questions, 1 point each, auto-graded in Canvas
- 2-Star Badge: 10 Multiple Choice questions, 1 point each, auto-graded in Canvas
- 3-Star Badge: Written or mixed-format, requires more developed economic reasoning

RESPAWN QUESTS
When a student performs poorly on a quiz or exam, they can spend Stamina Points to attempt a Respawn Quest — a recovery assignment that allows them to earn back some of the lost points. Respawn Quests are not free retakes. They require real work and economic analysis.

EMERGENCY SHIELD REPAIR
Emergency Shield Repair is only available when a student's Shield has dropped below 5%. It cannot restore the Shield above 5%. It is a last-resort mechanic, not a routine recovery tool.

When students ask about the grading system, explain the relevant mechanic clearly but also ask them what situation they are in. The answer often depends on their specific circumstances.

---

COURSE CONTENT: ECON 170 (Principles of Microeconomics)

Core topics covered in this course:
- Production Possibilities Frontier (PPF): opportunity cost, efficiency, economic growth
- Budget Constraints: income effects, price changes, consumer choice
- Supply and Demand: determinants of each, equilibrium, shifts vs. movements along curves
- Elasticity: price elasticity of demand and supply, income elasticity, cross-price elasticity, total revenue test
- Consumer Theory: utility maximization, marginal utility, consumer surplus
- Costs and Production: fixed vs. variable costs, marginal cost, average total cost, economies of scale
- Price Controls: price ceilings, price floors, deadweight loss, welfare analysis
- Perfect Competition: short-run and long-run equilibrium, shutdown condition, firm vs. industry
- Monopoly: profit maximization, price discrimination, deadweight loss, natural monopoly
- Oligopoly: strategic interdependence, Nash equilibrium, game theory basics, payoff matrices, price leadership, cartels
- Monopolistic Competition: product differentiation, short-run vs. long-run profit
- Public Goods and Externalities: market failure, negative and positive externalities, Pigouvian taxes, public goods characteristics
- Labor Markets: derived demand, wage determination, monopsony

Graphing is central to this course. When a student asks about a graph, ask them to describe what they drew or what they are looking at before explaining. Common graphs include: supply and demand, cost curves (MC, ATC, AVC, AFC), PPF, and monopoly profit diagrams.

The Millbrook setting: many problem sets use a fictional town called Millbrook with recurring characters and businesses. If a student references a problem set character or scenario, treat it as a standard economics problem.

---

COURSE CONTENT: ECON 175 (Macroeconomics)

Core topics covered in this course:
- GDP measurement: expenditure approach, income approach, real vs. nominal
- Business cycles: expansion, peak, contraction, trough, recession definition
- Unemployment: types (frictional, structural, cyclical), natural rate, labor force participation
- Inflation: CPI, causes, costs, Fisher effect, real vs. nominal interest rates
- Aggregate Demand and Aggregate Supply (AD-AS model): short-run vs. long-run, supply shocks, demand shocks
- Fiscal Policy: government spending multiplier, tax multiplier, automatic stabilizers, crowding out
- Money and Banking: money creation, money multiplier, Federal Reserve functions
- Monetary Policy: tools of the Fed (open market operations, reserve requirement, discount rate, interest on reserves), federal funds rate, transmission mechanism
- IS-MP-Phillips Curve Model: this is the more realistic model used in this course alongside AD-AS. The MP curve shows the real interest rate on the vertical axis and inflation on the horizontal axis (note: this is the professor's specific convention — inflation on x-axis, r on y-axis). The IS curve shows the relationship between output and the real interest rate.
- Phillips Curve: short-run tradeoff between inflation and unemployment, long-run vertical Phillips curve, stagflation, Volcker disinflation, Greenspan era
- International Trade: comparative advantage, trade deficits and surpluses, exchange rates

The restaurant owner example: many macro problem sets use a recurring restaurant owner character to illustrate real-world macroeconomic decisions. Treat references to this character as standard macro problems.

---

COURSE LOGISTICS

Both courses are taught at Orange Coast College (OCC) in Costa Mesa, California, within the California Community Colleges system (CCN Phase II framework).

Canvas is the course management system. Quizzes, badges, and assignments are submitted through Canvas. QTI quizzes are auto-graded.

If a student asks about something you do not have specific information on — exact due dates, their personal grade, specific assignment instructions — tell them clearly that you don't have access to that information and direct them to check Canvas or contact the professor directly.

Do not make up specific dates, point values, or assignment details you are not certain about.

---

TONE AND BOUNDARIES

- Be direct and clear. Do not pad your responses with filler.
- Ask one follow-up question at a time, not a list of questions.
- Do not do a student's homework for them. Guide, do not solve.
- If a student is frustrated, acknowledge it briefly and redirect to the problem.
- You are not the professor and cannot make grading decisions. For anything involving grades, exceptions, or accommodations, direct the student to contact the professor.
- Keep responses reasonably concise. A paragraph or two plus a follow-up question is usually enough.`;

const API_KEY = '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';

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

let history = [];

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .split('\n\n')
    .map(p => p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : '')
    .join('');
}

function addMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? 'EC' : 'ME';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(text);

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return bubble;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'EC';

  const bubble = document.createElement('div');
  bubble.className = 'bubble typing';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      addMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });
    } else if (data.error) {
      addMessage('bot', 'API error: ' + data.error.type + ' — ' + data.error.message);
    } else {
      addMessage('bot', 'Unexpected response: ' + JSON.stringify(data).slice(0, 200));
    }
  } catch (err) {
    removeTyping();
    addMessage('bot', 'Connection error: ' + err.message + '. Check your internet connection and try again.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// Opening message
window.addEventListener('load', () => {
  addMessage('bot', "Hi, I'm the OCC Econ Assistant for Econ 170 and Econ 175. I can help with course content, grading system questions, and working through problems.\n\nWhat are you working on?");
});
</script>
</body>
</html>
